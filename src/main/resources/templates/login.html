<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Like Hero To Zero - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f0;
            color: #333;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #2d6a4f, #40916c);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .container {
            max-width: 500px;
            margin: 3rem auto;
            padding: 0 1rem;
        }
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .login-box h2 {
            text-align: center;
            color: #2d6a4f;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2d6a4f;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2d6a4f;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: #2d6a4f;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .login-btn:hover {
            background-color: #1b4332;
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            border: 1px solid #f5c6cb;
        }
        .info-box {
            background-color: #e8f0e8;
            border-left: 4px solid #2d6a4f;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            font-size: 0.95rem;
            color: #2d6a4f;
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: #2d6a4f;
            text-decoration: none;
            font-size: 0.95rem;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .footer {
            text-align: center;
            padding: 2rem;
            color: #777;
            font-size: 0.85rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <!-- Kopfbereich -->
    <div class="header">
        <h1>Like Hero To Zero</h1>
        <p>Wissenschaftler-Login</p>
    </div>

    <div class="container">
        <div class="login-box">
            <h2>Anmelden</h2>

            <!-- Fehlermeldung bei gescheitertem Login -->
            <div class="error-message" th:if="${param.error}">
                Benutzername oder Passwort sind ungueltig. Bitte versuchen Sie es erneut.
            </div>

            <!-- Info-Box -->
            <div class="info-box">
                <strong>Zugang nur fuer registrierte Wissenschaftler:innen</strong>
            </div>

            <!-- Login-Formular -->
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Benutzername:</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Passwort:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="login-btn">Anmelden</button>
            </form>

            <!-- Link zur öffentlichen Ansicht -->
            <div class="back-link">
                <a href="/emissions">Zurueck zur öffentlichen Ansicht</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Like Hero To Zero &ndash; Fallstudie IPWA02-01</p>
    </div>

</body>
</html>

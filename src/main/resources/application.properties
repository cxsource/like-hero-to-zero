# ============================================================
# Like Hero To Zero - Anwendungskonfiguration
# ============================================================

# Servername
spring.application.name=like-hero-to-zero

# ---- MySQL-Konfiguration (Produktivbetrieb) ----
# Bitte die folgenden Werte an die lokale MySQL-Installation anpassen:
# spring.datasource.url=jdbc:mysql://localhost:3306/likeherotozerodb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=passwort
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---- H2 In-Memory-Datenbank (Entwicklung / Demo) ----
# Fuer den schnellen Start ohne externe MySQL-Installation:
spring.datasource.url=jdbc:h2:mem:likeherotozerodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
# update: Schema wird automatisch an Entity-Klassen angepasst
spring.jpa.hibernate.ddl-auto=update

# SQL-Ausgabe auf der Konsole (hilfreich fuer Entwicklung)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
